    <script>
      function createHeadings(latest) {
        const headers = [];

        for (let i = 1; i <= latest; i++) {
          let header = `<h2 id="week-${i}">
                          <a href="week${i}.html">Week ${i}</a>
                        </h2>`;
          headers.push(header);
        }

        // Reverse order
        headers.reverse();

        // Convert array to single string
        const headerString = headers.join("");

        // Insert after the title element
        document
          .querySelector("h1")
          .insertAdjacentHTML("afterend", headerString);
      }

      createHeadings(52);
